<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD to PDF Converter Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { 
            height: 60px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 2rem; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

        .editor-section { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        textarea { 
            flex: 1; background: transparent; color: var(--text); border: none; 
            padding: 2rem; font-family: 'Courier New', Courier, monospace; font-size: 1rem;
            outline: none; resize: none; line-height: 1.5;
        }

        .preview-section { background: #f8fafc; color: #1e293b; overflow-y: auto; padding: 2rem; }
        
        .controls { display: flex; gap: 1rem; align-items: center; }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 0.6rem 1.2rem; 
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { font-size: 0.8rem; color: #94a3b8; }

        /* PDF Styles for preview injection */
        #rendered-content h1 { color: #2563eb; margin-bottom: 1rem; }
        #rendered-content pre { background: #1e293b; color: white; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
        #rendered-content blockquote { border-left: 4px solid #ddd; padding-left: 1rem; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">📄 MD to PDF Pro</div>
        <div class="controls">
            <a href="/docs" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-right: 1.5rem; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#94a3b8'">Docs API</a>
            <span class="status" id="status-text">Prêt</span>
            <button class="btn" id="convert-btn">Exporter en PDF</button>
        </div>
    </header>

    <main>
        <div class="editor-section">
            <textarea id="md-input" placeholder="Commencez à écrire... de charger l'exemple ci-dessous."># 🚀 Rapport de Test SaaS

        </div>
        <div class="preview-section" id="rendered-content">
            <!-- Rendu HTML via JavaScript -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const textarea = document.getElementById('md-input');
        const preview = document.getElementById('rendered-content');
        const btn = document.getElementById('convert-btn');
        const stext = document.getElementById('status-text');

        // Preview live
        textarea.addEventListener('input', () => {
            preview.innerHTML = marked.parse(textarea.value);
        });

        // Trigger conversion
        btn.onclick = async () => {
            const md = textarea.value;
            if(!md) return alert("Le document est vide !");

            btn.disabled = true;
            stext.innerText = "Génération du PDF...";

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: md })
                });
                const result = await response.json();
                
                if(result.success) {
                    window.location.href = result.download_url;
                    stext.innerText = "Téléchargé avec succès";
                } else {
                    alert("Erreur: " + result.error);
                    stext.innerText = "Erreur de génération";
                }
            } catch(e) {
                alert("Erreur de connexion : " + e);
            } finally {
                btn.disabled = false;
                setTimeout(() => stext.innerText = "Prêt", 3000);
            }
        };

        // Initial render
        preview.innerHTML = marked.parse(textarea.value);
    </script>
</body>
</html>
